<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Chess</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
      font-family: system-ui, sans-serif; color: #eee; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(255,255,255,.08); padding: 10px 14px; border-radius: 8px;
    }
    #turn { font-weight: 700; font-size: 16px; }
    #status { color: #ffcf6b; min-height: 1.2em; font-size: 14px; }
    #hud button {
      margin-top: 8px; background: #2a2a38; color: #eee; border: 1px solid #555;
      padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #hud button:hover { background: #38384a; }
    #hud button:disabled { opacity: 0.3; cursor: default; }
    #hud button:disabled:hover { background: #2a2a38; }
    #undoRedo { display: flex; gap: 4px; margin-top: 8px; }
    #undoRedo button { margin-top: 0; font-size: 16px; padding: 2px 10px; }
    #hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #aaa; font: 13px/1.4 system-ui, sans-serif; pointer-events: none;
      background: rgba(0,0,0,.45); padding: 6px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="turn">White to move</div>
    <div id="status"></div>
    <div id="undoRedo">
      <button id="undoBtn">&#9664;</button>
      <button id="redoBtn">&#9654;</button>
    </div>
    <button id="reset">New game</button>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · edge pieces can move onto the adjacent face</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const SIZE = 8, TILE = 1, cubeSize = TILE;
    const offset = (SIZE - 1) / 2;

    // --- Scene / camera / renderer ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(1, 13, 11);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const kl = new THREE.DirectionalLight(0xffffff, 1.0); kl.position.set(8, 12, 9); scene.add(kl);
    const fl = new THREE.DirectionalLight(0x88aaff, 0.4); fl.position.set(-9, -6, -8); scene.add(fl);

    // --- The 8x8x8 checkerboard cube ---
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xf0d9b5, roughness: 0.7 });
    const darkMat  = new THREE.MeshStandardMaterial({ color: 0xb58863, roughness: 0.7 });
    const transLightMat = new THREE.MeshStandardMaterial({ color: 0xf0d9b5, roughness: 0.7, transparent: true, opacity: 0.5 });
    const transDarkMat  = new THREE.MeshStandardMaterial({ color: 0xb58863, roughness: 0.7, transparent: true, opacity: 0.5 });
    const geo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
    const cubeGroup = new THREE.Group();
    const cubeMeshes = [];
    for (let x = 0; x < SIZE; x++)
      for (let y = 0; y < SIZE; y++)
        for (let z = 0; z < SIZE; z++) {
          const m = new THREE.Mesh(geo, (x + y + z) % 2 === 0 ? darkMat : lightMat);
          m.position.set((x - offset) * TILE, (y - offset) * TILE, (z - offset) * TILE);
          m.userData.grid = [x, y, z];
          cubeGroup.add(m);
          cubeMeshes.push(m);
        }
    scene.add(cubeGroup);

    // --- Sphere-based chess pieces ---
    const PIECE_R = 0.38;
    const RING_TUBE = 0.02;
    const SEGS = 24;
    const TUBE_SEG = 6;

    const pieceSphereGeo = new THREE.SphereGeometry(PIECE_R, SEGS, SEGS);
    const pieceTorusGeo = new THREE.TorusGeometry(PIECE_R, RING_TUBE, TUBE_SEG, SEGS);
    const pieceDotGeo = new THREE.SphereGeometry(0.06, 10, 10);

    const pieceBodyMatCache = {};
    function bodyMat(color) {
      if (!pieceBodyMatCache[color])
        pieceBodyMatCache[color] = new THREE.MeshStandardMaterial({
          color: color === 'w' ? 0xf0f0f0 : 0x333333, roughness: 0.5, metalness: 0.05,
        });
      return pieceBodyMatCache[color];
    }
    const pieceRingMatCache = {};
    function ringMat(color) {
      if (!pieceRingMatCache[color])
        pieceRingMatCache[color] = new THREE.MeshStandardMaterial({
          color: color === 'w' ? 0xaaaaaa : 0x555555, roughness: 0.5,
        });
      return pieceRingMatCache[color];
    }
    const pieceDotMatCache = {};
    function dotMat(color) {
      if (!pieceDotMatCache[color])
        pieceDotMatCache[color] = new THREE.MeshStandardMaterial({
          color: color === 'w' ? 0x888888 : 0x777777, roughness: 0.5,
        });
      return pieceDotMatCache[color];
    }

    function createPieceGroup(type, color) {
      const group = new THREE.Group();
      const meshes = [];
      const R = PIECE_R;

      const sphere = new THREE.Mesh(pieceSphereGeo, bodyMat(color));
      group.add(sphere);
      meshes.push(sphere);

      if (type === 'k') {
        // King: plain sphere

      } else if (type === 'q') {
        // Queen: one dot on each side
        const queenDotGeo = new THREE.SphereGeometry(0.1, 10, 10);
        for (const s of [-1, 1]) {
          const dot = new THREE.Mesh(queenDotGeo, dotMat(color));
          dot.position.set(0, 0, s * R * 0.85);
          group.add(dot);
          meshes.push(dot);
        }

      } else if (type === 'r') {
        // Rook: 3 horizontal rings
        for (let i = 0; i < 3; i++) {
          const y = -R * 0.6 + (2 * R * 0.6 * i) / 2;
          const r = Math.sqrt(R * R - y * y);
          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(r, RING_TUBE, TUBE_SEG, SEGS),
            ringMat(color)
          );
          ring.position.y = y;
          ring.rotation.x = Math.PI / 2;
          group.add(ring);
          meshes.push(ring);
        }

      } else if (type === 'b') {
        // Bishop: 4 diagonal rings → 16 sections
        for (let i = 0; i < 4; i++) {
          const ring = new THREE.Mesh(pieceTorusGeo, ringMat(color));
          const q = new THREE.Quaternion().setFromUnitVectors(
            new THREE.Vector3(0, 0, 1),
            new THREE.Vector3(
              Math.sin(Math.PI / 4) * Math.sin((i * Math.PI) / 4),
              Math.cos(Math.PI / 4),
              Math.sin(Math.PI / 4) * Math.cos((i * Math.PI) / 4),
            ).normalize()
          );
          ring.quaternion.copy(q);
          group.add(ring);
          meshes.push(ring);
        }

      } else if (type === 'n') {
        // Knight: 4 dots on each side
        for (const s of [-1, 1]) {
          for (let i = 0; i < 4; i++) {
            const a = (i * Math.PI) / 2 + Math.PI / 4;
            const dot = new THREE.Mesh(pieceDotGeo, dotMat(color));
            dot.position.set(Math.cos(a) * R * 0.78, Math.sin(a) * R * 0.78, s * R * 0.65);
            group.add(dot);
            meshes.push(dot);
          }
        }

      } else if (type === 'p') {
        // Pawn: one vertical ring
        const ring = new THREE.Mesh(pieceTorusGeo, ringMat(color));
        group.add(ring);
        meshes.push(ring);
      }

      return { group, meshes };
    }

    /* ============================================================
       CUBE-SURFACE CHESS ENGINE
       A square is an outer cube [x,y,z] (each 0..7). Each of the 6 faces
       is a normal 8x8 board; squares on a shared edge belong to 2 faces
       (corners to 3). A piece generates moves on EVERY face it sits on,
       so only edge/corner pieces can change planes. Each move stays
       within one face (no edge-bending mid-move).
       ============================================================ */
    const key = (c) => c[0] + ',' + c[1] + ',' + c[2];
    const parse = (k) => k.split(',').map(Number);
    const sameCube = (a, b) => a[0] === b[0] && a[1] === b[1] && a[2] === b[2];

    const NORMALS = { TOP:[0,1,0], BOTTOM:[0,-1,0], LEFT:[-1,0,0], RIGHT:[1,0,0], FRONT:[0,0,1], BACK:[0,0,-1] };
    const FACE = {                                     // (u,v) = (file,rank) on that face
      TOP:    { uv: (c) => [c[0], c[2]], cube: (u, v) => [u, 7, v] },
      BOTTOM: { uv: (c) => [c[0], c[2]], cube: (u, v) => [u, 0, v] },
      LEFT:   { uv: (c) => [c[2], c[1]], cube: (u, v) => [0, v, u] },
      RIGHT:  { uv: (c) => [c[2], c[1]], cube: (u, v) => [7, v, u] },
      FRONT:  { uv: (c) => [c[0], c[1]], cube: (u, v) => [u, v, 7] },
      BACK:   { uv: (c) => [c[0], c[1]], cube: (u, v) => [u, v, 0] },
    };
    function facesOf(c) {
      const f = [];
      if (c[1] === 7) f.push('TOP');   if (c[1] === 0) f.push('BOTTOM');
      if (c[0] === 0) f.push('LEFT');  if (c[0] === 7) f.push('RIGHT');
      if (c[2] === 7) f.push('FRONT'); if (c[2] === 0) f.push('BACK');
      return f;
    }
    // Pawn "forward" per face = the in-face step that increases z (white advances toward +z).
    // `side` is the perpendicular in-face axis used for the two diagonal captures.
    // FRONT/BACK have z fixed, so pawns can't advance there (they'd have promoted on arrival).
    const PAWN_FWD = {
      TOP:    { fwd: [0, 1], side: [1, 0] },
      BOTTOM: { fwd: [0, 1], side: [1, 0] },
      LEFT:   { fwd: [1, 0], side: [0, 1] },
      RIGHT:  { fwd: [1, 0], side: [0, 1] },
    };

    const KN = [[1,2],[2,1],[2,-1],[1,-2],[-1,-2],[-2,-1],[-2,1],[-1,2]];
    const ORTHO = [[1,0],[-1,0],[0,1],[0,-1]];
    const DIAG  = [[1,1],[1,-1],[-1,1],[-1,-1]];
    const ALL8  = [...ORTHO, ...DIAG];

    function startState() {
      const b = {};
      const back = ['r','n','b','k','q','b','n','r'];
      for (let x = 0; x < 8; x++) {
        b[key([x,7,0])] = { t: back[x], c: 'w' };  b[key([x,7,1])] = { t: 'p', c: 'w' };
        b[key([x,7,7])] = { t: back[x], c: 'b' };  b[key([x,7,6])] = { t: 'p', c: 'b' };
      }
      return { board: b, turn: 'w', castle: { wK:1, wQ:1, bK:1, bQ:1 }, ep: null };
    }

    // Pseudo-legal moves for the piece at `cube`, restricted to one `face`.
    function faceMoves(s, cube, face, attackOnly) {
      const p = s.board[key(cube)]; if (!p) return [];
      const F = FACE[face], [u, v] = F.uv(cube);
      const me = p.c, opp = me === 'w' ? 'b' : 'w', out = [];
      const onb = (uu, vv) => uu >= 0 && uu < 8 && vv >= 0 && vv < 8;
      const at  = (uu, vv) => onb(uu, vv) ? s.board[key(F.cube(uu, vv))] : undefined;
      const dest = (uu, vv, x = {}) => out.push({ from: cube, to: F.cube(uu, vv), face, ...x });
      const slide = (dirs) => { for (const [du, dv] of dirs) { let uu=u+du, vv=v+dv;
        while (onb(uu, vv)) { const q = at(uu, vv);
          if (!q) dest(uu, vv); else { if (q.c === opp) dest(uu, vv, { capture: true }); break; }
          uu += du; vv += dv; } } };
      const step = (dirs) => { for (const [du, dv] of dirs) { const uu=u+du, vv=v+dv;
        if (!onb(uu, vv)) continue; const q = at(uu, vv);
        if (!q) dest(uu, vv); else if (q.c === opp) dest(uu, vv, { capture: true }); } };

      if (p.t === 'p') {
        const FW = PAWN_FWD[face];                       // forward (toward the foe) on this face
        if (!FW) return out;                             // FRONT/BACK: no advance direction
        const sg = me === 'w' ? 1 : -1, promoZ = me === 'w' ? 7 : 0;
        const fu = FW.fwd[0] * sg, fv = FW.fwd[1] * sg;  // forward step in (u,v)
        const su = FW.side[0], sv = FW.side[1];          // sideways axis (for captures)
        const promo = (tc) => (tc[2] === promoZ ? { promo: 'q' } : {});
        if (!attackOnly) {
          const au = u + fu, av = v + fv;
          if (onb(au, av) && !at(au, av)) {
            const tc = F.cube(au, av);
            out.push({ from: cube, to: tc, face, ...promo(tc) });
            const home = face === 'TOP' && ((me === 'w' && v === 1) || (me === 'b' && v === 6));
            const bu = u + 2 * fu, bv = v + 2 * fv;
            if (home && onb(bu, bv) && !at(bu, bv)) out.push({ from: cube, to: F.cube(bu, bv), face, double: true });
          }
        }
        for (const sd of [1, -1]) {                      // the two forward diagonals
          const cu = u + fu + su * sd, cv = v + fv + sv * sd;
          if (!onb(cu, cv)) continue;
          const tc = F.cube(cu, cv);
          if (attackOnly) { out.push({ from: cube, to: tc, face }); continue; }
          const q = s.board[key(tc)];
          if (q && q.c === opp) out.push({ from: cube, to: tc, face, capture: true, ...promo(tc) });
          if (s.ep && sameCube(tc, s.ep)) out.push({ from: cube, to: tc, face, capture: true, ep: true });
        }
      } else if (p.t === 'n') step(KN);
      else if (p.t === 'b') slide(DIAG);
      else if (p.t === 'r') slide(ORTHO);
      else if (p.t === 'q') slide(ALL8);
      else if (p.t === 'k') {
        step(ALL8);
        if (!attackOnly && face === 'TOP') {            // castling only on the home face
          if (me === 'w' && u === 3 && v === 0) {
            if (s.castle.wK && !at(4,0) && !at(5,0) && !at(6,0)) dest(5, 0, { castle: 'K' });
            if (s.castle.wQ && !at(2,0) && !at(1,0)) dest(1, 0, { castle: 'Q' });
          }
          if (me === 'b' && u === 3 && v === 7) {
            if (s.castle.bK && !at(4,7) && !at(5,7) && !at(6,7)) dest(5, 7, { castle: 'K' });
            if (s.castle.bQ && !at(2,7) && !at(1,7)) dest(1, 7, { castle: 'Q' });
          }
        }
      }
      return out;
    }

    function pseudoMoves(s, cube) {
      const seen = new Set(), res = [];
      for (const face of facesOf(cube))
        for (const mv of faceMoves(s, cube, face, false)) {
          const id = key(mv.to) + (mv.castle || '') + (mv.promo || '');
          if (!seen.has(id)) { seen.add(id); res.push(mv); }
        }
      return res;
    }
    function attacksOf(s, cube) {
      const set = new Set();
      for (const face of facesOf(cube))
        for (const mv of faceMoves(s, cube, face, true)) set.add(key(mv.to));
      return set;
    }
    function isAttacked(s, target, by) {
      const tk = key(target);
      for (const k in s.board) if (s.board[k].c === by && attacksOf(s, parse(k)).has(tk)) return true;
      return false;
    }
    function findKing(s, c) {
      for (const k in s.board) { const p = s.board[k]; if (p.t === 'k' && p.c === c) return parse(k); }
      return null;
    }
    const inCheck = (s, c) => { const k = findKing(s, c); return k ? isAttacked(s, k, c === 'w' ? 'b' : 'w') : false; };

    function makeMove(s, mv) {
      const nb = Object.assign({}, s.board);
      const p = nb[key(mv.from)]; delete nb[key(mv.from)];
      const T = FACE.TOP;
      if (mv.ep) { const F = FACE[mv.face]; const [tu] = F.uv(mv.to), [, fv] = F.uv(mv.from);
        delete nb[key(F.cube(tu, fv))]; }
      nb[key(mv.to)] = mv.promo ? { t: mv.promo, c: p.c } : p;
      if (mv.castle) { const v = T.uv(mv.from)[1];
        if (mv.castle === 'K') { nb[key(T.cube(4, v))] = nb[key(T.cube(7, v))]; delete nb[key(T.cube(7, v))]; }
        else { nb[key(T.cube(2, v))] = nb[key(T.cube(0, v))]; delete nb[key(T.cube(0, v))]; } }
      const ns = { board: nb, turn: s.turn === 'w' ? 'b' : 'w', castle: { ...s.castle }, ep: null };
      if (p.t === 'k') { if (p.c === 'w') { ns.castle.wK = ns.castle.wQ = 0; } else { ns.castle.bK = ns.castle.bQ = 0; } }
      const clr = (k) => {
        if (k === key(T.cube(7,0))) ns.castle.wK = 0; if (k === key(T.cube(0,0))) ns.castle.wQ = 0;
        if (k === key(T.cube(7,7))) ns.castle.bK = 0; if (k === key(T.cube(0,7))) ns.castle.bQ = 0; };
      clr(key(mv.from)); clr(key(mv.to));
      if (mv.double) { ns.ep = [(mv.from[0]+mv.to[0])/2, (mv.from[1]+mv.to[1])/2, (mv.from[2]+mv.to[2])/2]; }
      return ns;
    }

    function legalMoves(s, cube) {
      const p = s.board[key(cube)]; if (!p || p.c !== s.turn) return [];
      const opp = p.c === 'w' ? 'b' : 'w', T = FACE.TOP;
      const planeLocked = inCheck(s, s.turn);
      const nFaces = facesOf(cube).length;
      return pseudoMoves(s, cube).filter((mv) => {
        if (planeLocked && facesOf(mv.to).length < nFaces) return false;
        if (mv.castle) {
          const v = T.uv(mv.from)[1];
          if (isAttacked(s, T.cube(3, v), opp)) return false;
          for (const uu of (mv.castle === 'K' ? [4, 5] : [2, 1]))
            if (isAttacked(s, T.cube(uu, v), opp)) return false;
        }
        const ns = makeMove(s, mv), k = findKing(ns, p.c);
        return k && !isAttacked(ns, k, opp);
      });
    }
    function anyLegal(s, c) {
      for (const k in s.board) if (s.board[k].c === c && legalMoves(s, parse(k)).length) return true;
      return false;
    }

    /* ============================================================
       3D RENDERING + INTERACTION
       ============================================================ */
    const pieceLayer = new THREE.Group();  scene.add(pieceLayer);
    const markerLayer = new THREE.Group(); scene.add(markerLayer);
    const pieceMeshes = [];
    const cubeCenter = (c) => new THREE.Vector3((c[0]-offset)*TILE, (c[1]-offset)*TILE, (c[2]-offset)*TILE);

    let state, selected, legal, gameOver;
    const history = [];
    let redoStack = [];

    function syncPieces() {
      cubeMeshes.forEach(m => {
        const [x, y, z] = m.userData.grid;
        m.material = (x + y + z) % 2 === 0 ? darkMat : lightMat;
      });
      [...pieceLayer.children].forEach((c) => pieceLayer.remove(c));
      pieceMeshes.length = 0;
      for (const k in state.board) {
        const cube = parse(k), p = state.board[k];
        const mesh = cubeMeshes.find(m => {
          const [gx, gy, gz] = m.userData.grid;
          return gx === cube[0] && gy === cube[1] && gz === cube[2];
        });
        if (mesh) {
          const [x, y, z] = mesh.userData.grid;
          mesh.material = (x + y + z) % 2 === 0 ? transDarkMat : transLightMat;
        }
        const { group: pg, meshes } = createPieceGroup(p.t, p.c);
        pg.position.copy(cubeCenter(cube));
        meshes.forEach(m => { m.userData.cube = cube; pieceMeshes.push(m); });
        pieceLayer.add(pg);
      }
    }

    const markerCubeGeo = new THREE.BoxGeometry(cubeSize * 1.03, cubeSize * 1.03, cubeSize * 1.03);
    const markerMatSelected = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.35, depthWrite: false });
    const markerMatMove = new THREE.MeshBasicMaterial({ color: 0x46e046, transparent: true, opacity: 0.25, depthWrite: false });
    const markerMatCapture = new THREE.MeshBasicMaterial({ color: 0xff5a5a, transparent: true, opacity: 0.35, depthWrite: false });
    const markerAffected = [];
    function cubeMeshAt(c) {
      return cubeMeshes.find(m => {
        const [gx, gy, gz] = m.userData.grid;
        return gx === c[0] && gy === c[1] && gz === c[2];
      });
    }
    function clearMarkers() {
      markerAffected.forEach(c => {
        const mesh = cubeMeshAt(c);
        if (!mesh) return;
        const [x, y, z] = mesh.userData.grid;
        if (state.board[key(c)])
          mesh.material = (x + y + z) % 2 === 0 ? transDarkMat : transLightMat;
        else
          mesh.material = (x + y + z) % 2 === 0 ? darkMat : lightMat;
      });
      markerAffected.length = 0;
      [...markerLayer.children].forEach((c) => markerLayer.remove(c));
    }
    function drawMarkers() {
      clearMarkers();
      if (!selected) return;
      const selCube = cubeMeshAt(selected);
      if (selCube) { const [x,y,z] = selCube.userData.grid; selCube.material = (x+y+z)%2===0 ? transDarkMat : transLightMat; markerAffected.push(selected); }
      const sel = new THREE.Mesh(markerCubeGeo, markerMatSelected);
      sel.position.copy(cubeCenter(selected));
      markerLayer.add(sel);
      for (const mv of legal) {
        const tc = cubeMeshAt(mv.to);
        if (tc) { const [x,y,z] = tc.userData.grid; tc.material = (x+y+z)%2===0 ? transDarkMat : transLightMat; markerAffected.push(mv.to); }
        const m = new THREE.Mesh(markerCubeGeo, mv.capture ? markerMatCapture : markerMatMove);
        m.position.copy(cubeCenter(mv.to));
        m.userData.move = mv;
        markerLayer.add(m);
      }
    }

    function setHUD(msg) {
      document.getElementById('turn').textContent =
        gameOver ? 'Game over' : (state.turn === 'w' ? 'White' : 'Black') + ' to move';
      document.getElementById('status').textContent = msg;
    }
    function select(cube) { selected = cube; legal = legalMoves(state, cube); drawMarkers(); }
    function deselect() { selected = null; legal = []; clearMarkers(); }
    function pushHistory() {
      history.push(JSON.parse(JSON.stringify({ state, gameOver })));
      redoStack = [];
      updateUndoRedoButtons();
    }
    function applyMove(mv) {
      pushHistory();
      state = makeMove(state, mv); deselect(); syncPieces();
      const checked = inCheck(state, state.turn);
      if (!anyLegal(state, state.turn)) {
        gameOver = true;
        setHUD(checked ? 'Checkmate — ' + (state.turn === 'w' ? 'Black' : 'White') + ' wins!' : 'Stalemate — draw.');
      } else setHUD(checked ? 'Check!' : '');
      updateUndoRedoButtons();
    }
    function refreshHUD() {
      const checked = inCheck(state, state.turn);
      if (gameOver) {
        const winner = state.turn === 'w' ? 'Black' : 'White';
        setHUD(checked ? 'Checkmate — ' + winner + ' wins!' : 'Stalemate — draw.');
      } else {
        setHUD(checked ? 'Check!' : '');
      }
    }
    function undo() {
      if (!history.length) return;
      redoStack.push(JSON.parse(JSON.stringify({ state, gameOver })));
      const prev = history.pop();
      state = prev.state; gameOver = prev.gameOver;
      deselect(); syncPieces(); refreshHUD(); updateUndoRedoButtons();
    }
    function redo() {
      if (!redoStack.length) return;
      history.push(JSON.parse(JSON.stringify({ state, gameOver })));
      const next = redoStack.pop();
      state = next.state; gameOver = next.gameOver;
      deselect(); syncPieces(); refreshHUD(); updateUndoRedoButtons();
    }
    function updateUndoRedoButtons() {
      document.getElementById('undoBtn').disabled = history.length === 0;
      document.getElementById('redoBtn').disabled = redoStack.length === 0;
    }
    function newGame() {
      state = startState(); gameOver = false; deselect(); syncPieces(); setHUD('');
      history.length = 0; redoStack.length = 0; updateUndoRedoButtons();
    }

    const raycaster = new THREE.Raycaster();
    const ptr = new THREE.Vector2();
    let downXY = null;
    renderer.domElement.addEventListener('pointerdown', (e) => { downXY = [e.clientX, e.clientY]; });
    renderer.domElement.addEventListener('pointerup', (e) => {
      if (!downXY) return;
      const moved = Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]); downXY = null;
      if (moved > 5 || gameOver) return;
      ptr.x = (e.clientX / innerWidth) * 2 - 1;
      ptr.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(ptr, camera);
      const hits = raycaster.intersectObjects([...markerLayer.children, ...pieceMeshes], false);
      if (!hits.length) { deselect(); return; }
      const o = hits[0].object;
      let move = o.userData.move || null;
      const cube = o.userData.cube || null;
      if (!move && cube && selected) move = legal.find((m) => sameCube(m.to, cube));
      if (move) { applyMove(move); return; }
      if (cube) {
        const p = state.board[key(cube)];
        if (p && p.c === state.turn) select(cube); else deselect();
        return;
      }
      deselect();
    });
    document.getElementById('reset').addEventListener('click', newGame);
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    // --- Resize + render loop ---
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

    newGame();
    animate();
  </script>
</body>
</html>
